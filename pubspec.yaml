name: trans_prism
description: "稳态光盒 (Trans Prism) - 一站式 HRT 用药提醒与离线知识库终端"
publish_to: 'none'

version: 1.2.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  # --- UI 与核心功能 ---
  cupertino_icons: ^1.0.6
  fl_chart: ^0.69.2
  flutter_markdown: ^0.7.6
  
  # --- 本地存储与文件处理 ---
  shared_preferences: ^2.2.3
  path_provider: ^2.1.5
  file_picker: ^8.0.0
  archive: ^3.3.2
  
  # --- 网络与 WebView ---
  dio: ^5.4.3
  http: ^1.6.0
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.8
  webview_flutter_wkwebview: ^3.14.0
  url_launcher: ^6.2.6
  
  # --- 系统功能与工具 ---
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  package_info_plus: ^8.1.0
  uuid: ^4.5.3

  # --- 权限与保活 ---
  permission_handler: ^11.3.1
  
  # --- 音频相关 (嗓音分析) ---
  record: ^6.0.0
  pitch_detector_dart: ^0.0.7
  audioplayers: ^6.4.0
  shelf: ^1.4.1
  shelf_static: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/data/
    - assets/oyama_hrt/
    - assets/oyama_hrt/assets/
    - assets/wiki_data/

# ─── 桌面图标生成配置 ──────────────────────────────────
# 运行: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo_foreground.png"
  adaptive_icon_background: "#0F111A"
  adaptive_icon_foreground: "assets/logo_foreground.png"